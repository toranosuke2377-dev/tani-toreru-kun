name: 毎朝LINE通知

on:
  schedule:
    # 毎日22:00 UTC = 日本時間7:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行もできる

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node notify.mjs
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
